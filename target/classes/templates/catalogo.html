<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/header :: head('Catálogo - Bolsos&Co')}"></head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="py-5">
    <div class="container">
        <div class="row mb-4">
            <div class="col">
                <h1 class="fw-bold">Catálogo</h1>
                <p class="text-secondary" th:if="${categoriaActual != null}" th:text="|Categoría: ${categoriaActual}|">Categoría seleccionada</p>
                <p class="text-secondary" th:if="${categoriaActual == null}">Todos nuestros productos</p>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3">Filtrar por</h6>
                        <hr>
                        <h6 class="fw-bold mb-2">Categoría</h6>
                        <div class="d-flex flex-column gap-2">
                            <a th:href="@{/Tienda/catalogo}" class="btn btn-sm" th:classappend="${categoriaActual == null} ? 'btn-primary' : 'btn-outline-secondary'">Todas</a>
                            <a th:href="@{/Tienda/catalogo(categoria=${cat.nombre})}" th:each="cat : ${categorias}"
                               class="btn btn-sm" th:classappend="${#strings.equals(categoriaActual, cat.nombre)} ? 'btn-primary' : 'btn-outline-secondary'"
                               th:text="${cat.nombre}">Categoría</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div th:if="${#lists.isEmpty(productos)}" class="text-center py-5">
                    <i class="bi bi-search fs-1 text-secondary"></i>
                    <p class="text-secondary mt-2">No encontramos productos en esta categoría.</p>
                    <a th:href="@{/Tienda/catalogo}" class="btn btn-primary mt-2">Ver todos</a>
                </div>
                <div class="row g-4">
                    <div class="col-md-6 col-xl-4" th:each="p : ${productos}">
                        <div class="product-card h-100">
                            <div class="position-relative overflow-hidden">
                                <img  th:src="${p.imagen}"
                                        th:alt="${p.nombre}" class="w-100" style="height: 250px; object-fit: cover;">
                            </div>
                            <div class="card-body p-3 d-flex flex-column">
                                <small class="text-secondary" th:text="${p.categoria.nombre}">Categoría</small>
                                <h6 class="fw-bold mt-1" th:text="${p.nombre}">Producto</h6>
                                <p class="text-secondary small mb-2 text-truncate" th:text="${p.descripcion}">Descripción</p>
                                <div class="mt-auto d-flex justify-content-between align-items-center">
                                    <span class="product-price" th:text="|$${#numbers.formatDecimal(p.precio, 1, 2)}|">$99.99</span>
                                    <a th:href="@{/Tienda/producto/{id}(id=${p.idProducto})}" class="btn btn-sm btn-primary">Ver más</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
