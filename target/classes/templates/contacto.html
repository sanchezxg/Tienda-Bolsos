<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/header :: head('Contacto - Bolsos&Co')}"></head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="py-5">
    <div class="container">
        <div class="row mb-5 text-center">
            <div class="col">
                <h1 class="fw-bold">Contactanos</h1>
                <p class="text-secondary">Estamos acá para ayudarte. Dejanos tu mensaje.</p>
            </div>
        </div>

        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <strong>¡Mensaje enviado!</strong> Te vamos a responder a la brevedad.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-5">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <form th:action="@{/contacto}" method="post">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Nombre</label>
                                    <input type="text" name="nombre" class="form-control form-control-lg" required placeholder="Tu nombre">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="email" name="email" class="form-control form-control-lg" required placeholder="tu@email.com">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">Mensaje</label>
                                    <textarea name="mensaje" class="form-control form-control-lg" rows="5" required placeholder="Decinos en qué podemos ayudarte..."></textarea>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary btn-lg px-5">
                                        <i class="bi bi-send"></i> Enviar Mensaje
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="card shadow-sm border-0 rounded-4 bg-dark text-light h-100">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Información de Contacto</h5>
                        <div class="d-flex gap-3 mb-4">
                            <i class="bi bi-geo-alt fs-4 text-gold"></i>
                            <div>
                                <h6 class="fw-bold">Dirección</h6>
                                <p class="text-secondary mb-0">Av. Principal 1234<br>CABA, Argentina</p>
                            </div>
                        </div>
                        <div class="d-flex gap-3 mb-4">
                            <i class="bi bi-envelope fs-4 text-gold"></i>
                            <div>
                                <h6 class="fw-bold">Email</h6>
                                <p class="text-secondary mb-0">hola@bolsosyco.com</p>
                            </div>
                        </div>
                        <div class="d-flex gap-3 mb-4">
                            <i class="bi bi-telephone fs-4 text-gold"></i>
                            <div>
                                <h6 class="fw-bold">Teléfono</h6>
                                <p class="text-secondary mb-0">+54 11 5555-0123</p>
                            </div>
                        </div>
                        <div class="d-flex gap-3">
                            <i class="bi bi-clock fs-4 text-gold"></i>
                            <div>
                                <h6 class="fw-bold">Horarios</h6>
                                <p class="text-secondary mb-0">Lun a Vie: 9:00 - 19:00<br>Sáb: 10:00 - 14:00</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
