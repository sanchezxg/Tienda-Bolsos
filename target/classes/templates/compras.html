<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/header :: head('Mis Compras - Bolsos&Co')}"></head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="py-5">
    <div class="container">
        <h1 class="fw-bold mb-4">Mis Compras</h1>

        <div th:if="${#lists.isEmpty(compras)}" class="text-center py-5">
            <i class="bi bi-receipt display-1 text-secondary"></i>
            <h4 class="mt-3 text-secondary">Todavía no realizaste ninguna compra</h4>
            <p class="text-secondary">Explorá nuestro catálogo y encontrá el bolso perfecto.</p>
            <a th:href="@{/Tienda/catalogo}" class="btn btn-primary btn-lg mt-2">Ir al Catálogo</a>
        </div>

        <div th:if="${not #lists.isEmpty(compras)}">
            <div class="row g-4">
                <div class="col-12">
                    <div class="card shadow-sm border-0 rounded-4">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-dark">
                                        <tr>
                                            <th class="ps-4">#</th>
                                            <th>Fecha</th>
                                            <th>Total</th>
                                            <th class="text-end pe-4">Detalle</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="c : ${compras}">
                                            <td class="ps-4 fw-bold" th:text="${c.idCompra}">1</td>
                                            <td th:text="${#temporals.format(c.fecha, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                                            <td class="fw-bold text-primary-brand" th:text="|$${#numbers.formatDecimal(c.total, 1, 2)}|">$99.99</td>
                                            <td class="text-end pe-4">
                                                <a th:href="@{/detalles/{idCompra}(idCompra=${c.idCompra})}" class="btn btn-sm btn-outline-primary">
                                                    <i class="bi bi-eye"></i> Ver
                                                </a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
