<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/header :: head('Editar Producto - Bolsos&Co')}"></head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="py-5">
    <div class="container">
        <div class="row mb-4">
            <div class="col">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/Tienda/home}" class="text-decoration-none">Inicio</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/productos}" class="text-decoration-none">Mis Productos</a></li>
                        <li class="breadcrumb-item active" th:text="'Editar: ' + ${product.nombre}">Editar Producto</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-lg-5">
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <div class="bg-warning bg-opacity-10 p-3 rounded-3">
                                <i class="bi bi-pencil-square fs-4 text-warning"></i>
                            </div>
                            <div>
                                <h4 class="fw-bold mb-1">Editar Producto</h4>
                                <p class="text-secondary mb-0">Modificá los datos de tu producto</p>
                            </div>
                        </div>

                        <hr>

                        <form th:action="@{/productos/actualizar/{idProducto}(idProducto=${product.idProducto})}" method="post"
                              th:object="${product}">

                            <div class="row">
                                <div class="col-md-8">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Nombre del producto</label>
                                        <input type="text" th:field="*{nombre}" class="form-control" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Descripción</label>
                                        <textarea th:field="*{descripcion}" class="form-control" rows="4"></textarea>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold">Precio</label>
                                            <div class="input-group">
                                                <span class="input-group-text">$</span>
                                                <input type="number" th:field="*{precio}" class="form-control" step="0.01" required>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold">Stock</label>
                                            <input type="number" th:field="*{stock}" class="form-control" required>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">URL de la imagen</label>
                                        <input type="url" th:field="*{imagen}" class="form-control" id="imagenUrl" placeholder="https://ejemplo.com/imagen.jpg">
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label fw-semibold">Categoría</label>
                                        <select name="idCategoria" class="form-select" required>
                                            <option value="">Seleccioná una categoría</option>
                                            <option th:each="cat : ${categorias}"
                                                    th:value="${cat.idCategoria}"
                                                    th:text="${cat.nombre}"
                                                    th:selected="${cat.idCategoria == product.categoria.idCategoria}">Categoría</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <div class="card bg-light border-0 rounded-3">
                                        <div class="card-body text-center p-3">
                                            <label class="form-label fw-semibold small text-secondary">Vista previa</label>
                                            <img th:src="${product.imagen}" th:alt="${product.nombre}"
                                                 id="previewImage"
                                                 class="w-100 rounded-3 mb-2"
                                                 style="height: 180px; object-fit: cover;"
                                                 onerror="this.src='https://placehold.co/300x200?text=Sin+imagen'">
                                            <small class="text-secondary d-block">La imagen se actualiza al guardar</small>
                                        </div>
                                    </div>

                                    <div class="mt-3 p-3 bg-info bg-opacity-10 rounded-3">
                                        <small class="text-info d-block mb-1"><i class="bi bi-info-circle"></i> ID del producto:</small>
                                        <span class="badge bg-dark fs-6" th:text="'#' + ${product.idProducto}">#ID</span>
                                    </div>
                                </div>
                            </div>

                            <hr class="my-4">

                            <div class="d-flex gap-2 justify-content-end">
                                <a th:href="@{/productos}" class="btn btn-outline-secondary">
                                    <i class="bi bi-x-lg"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-warning px-4">
                                    <i class="bi bi-check-lg"></i> Guardar cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
