<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/header :: head('Carrito - Bolsos&Co')}"></head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="py-5">
    <div class="container">
        <h1 class="fw-bold mb-4">Tu Carrito</h1>

        <div th:if="${#lists.isEmpty(items)}" class="text-center py-5">
            <i class="bi bi-cart-x display-1 text-secondary"></i>
            <h4 class="mt-3 text-secondary">Tu carrito está vacío</h4>
            <p class="text-secondary">Agregá productos para empezar tu compra.</p>
            <a th:href="@{/Tienda/catalogo}" class="btn btn-primary btn-lg mt-2">Ir al Catálogo</a>
        </div>

        <div th:if="${not #lists.isEmpty(items)}">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0 rounded-4">
                        <div class="card-body p-4">
                            <div th:each="item, stat : ${items}" class="mb-3 cart-item">
                                <div class="row align-items-center g-3">
                                    <div class="col-md-5">
                                        <div class="d-flex align-items-center gap-3">
                                            <img th:src="${item.producto.imagen}" th:alt="${item.producto.nombre}" class="cart-item-image cart-item-count" th:data-count="${item.cantidad}">
                                            <div>
                                                <h6 class="fw-bold mb-1" th:text="${item.producto.nombre}">Producto</h6>
                                                <small class="text-secondary" th:text="|$${#numbers.formatDecimal(item.producto.precio, 1, 2)}|">$99.99</small>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-5 col-md-3">
                                        <form th:action="@{/carrito/actualizar}" method="post" class="d-flex align-items-center gap-2">
                                            <input type="hidden" name="productoId" th:value="${item.producto.idProducto}">
                                            <div class="input-group input-group-sm qty-container" style="width: 100px;">
                                                <button type="button" class="btn btn-outline-secondary qty-btn qty-minus">-</button>
                                                <input type="number" name="cantidad" class="form-control text-center qty-input" th:value="${item.cantidad}" min="1" max="99" onchange="this.form.submit()">
                                                <button type="button" class="btn btn-outline-secondary qty-btn qty-plus">+</button>
                                            </div>
                                        </form>
                                    </div>
                                    <div class="col-4 col-md-3 text-end">
                                        <span class="fw-bold text-primary-brand" th:text="|$${#numbers.formatDecimal(item.subtotal, 1, 2)}|">$99.99</span>
                                    </div>
                                    <div class="col-3 col-md-1 text-end">
                                        <form th:action="@{/carrito/eliminar}" method="post" th:id="|removeForm${item.producto.idProducto}|">
                                            <input type="hidden" name="idProducto" th:value="${item.producto.idProducto}">
                                            <button type="button" class="btn btn-sm btn-outline-danger remove-from-cart" th:data-product-id="${item.producto.idProducto}">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                                <hr th:if="${!stat.last}">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0 rounded-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4">Resumen</h5>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-secondary">Subtotal</span>
                                <span th:text="|$${#numbers.formatDecimal(total, 1, 2)}|">$0.00</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-secondary">Envío</span>
                                <span class="text-success fw-bold">Gratis</span>
                            </div>
                            <hr>
                            <form action="/ProcesarCompra" method="post">
                            <div class="d-flex justify-content-between mb-4">
                                <input type="hidden" name="total" th:value="${total}">
                                <span class="fw-bold fs-5">Total</span>
                                <span class="fw-bold fs-5 text-primary-brand" th:text="|$${#numbers.formatDecimal(total, 1, 2)}|">$0.00</span>
                            </div>

                            <button class="btn btn-primary w-100 btn-lg">
                                <i class="bi bi-credit-card"></i> Finalizar Compra
                            </button>
                            </form>
                            <p class="text-secondary small text-center mt-2 mb-0">Simulación frontend</p>
                            <div class="text-center mt-3">
                                <a th:href="@{/catalogo}" class="text-decoration-none small">Seguir comprando</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
