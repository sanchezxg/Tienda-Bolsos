<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/header :: head('Mis Productos - Bolsos&Co')}"></head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="py-5">
    <div class="container">
        <div class="alert alert-success"
             th:if="${success}"
             th:text="${success}">
        </div>
        <div class="row mb-4">
            <div class="col">
                <h1 class="fw-bold">Mis Productos</h1>
                <p class="text-secondary">Publicá y gestioná tus productos</p>
            </div>
        </div>

        <div class="row g-4">
            <!-- FORMULARIO: PUBLICAR PRODUCTO -->
            <div class="col-lg-5">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="bi bi-plus-circle"></i> Publicar producto</h5>
                        <hr>
                        <form th:action="@{/productos/guardar}" method="post"
                              th:object="${product}" >

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Nombre</label>
                                <input type="text"  th:field="*{nombre}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Descripción</label>
                                <textarea   th:field="*{descripcion}"  class="form-control" rows="3"></textarea>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label fw-semibold">Precio</label>
                                    <input type="number"  th:field="*{precio}" class="form-control" step="0.01" required>
                                </div>
                                <div class="col">
                                    <label class="form-label fw-semibold">Stock</label>
                                    <input type="number" th:field="*{stock}"  class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">URL de la imagen</label>
                                <input type="url" th:field="*{imagen}"  class="form-control" placeholder="https://ejemplo.com/imagen.jpg">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Categoría</label>
                                <select  name="idCategoria" class="form-select" required>
                                    <option value="">Seleccioná una categoría</option>
                                    <option th:each="cat : ${categorias}"
                                            th:value="${cat.idCategoria}"
                                            th:text="${cat.nombre}">Categoría</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-cloud-upload"></i> Publicar
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- LISTADO: MIS PRODUCTOS -->
            <div class="col-lg-7">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3"><i class="bi bi-grid"></i> Mis productos publicados</h5>
                        <hr>

                        <div th:if="${#lists.isEmpty(productos)}" class="text-center py-5">
                            <i class="bi bi-box-seam fs-1 text-secondary"></i>
                            <p class="text-secondary mt-2">Todavía no publicaste ningún producto.</p>
                        </div>

                        <div th:if="${!#lists.isEmpty(productos)}" class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Producto</th>
                                        <th>Precio</th>
                                        <th>Stock</th>
                                        <th>Acción</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="p : ${productos}">
                                        <td>
                                            <div class="d-flex align-items-center gap-2">
                                                <img th:src="${p.imagen}" th:alt="${p.nombre}"
                                                     style="width: 48px; height: 48px; object-fit: cover; border-radius: 8px;">
                                                <div>
                                                    <span class="fw-semibold" th:text="${p.nombre}">Producto</span>
                                                    <br>
                                                    <small class="text-secondary" th:text="${p.categoria.nombre}">Categoría</small>
                                                </div>
                                            </div>
                                        </td>
                                        <td th:text="|$${#numbers.formatDecimal(p.precio, 1, 2)}|">$99.99</td>
                                        <td th:text="${p.stock}">10</td>
                                        <td>
                                            <form th:action="@{/productos/eliminar/{idProducto}(idProducto=${p.idProducto})}" method="post" style="display:inline;">
                                                <input type="hidden" name="idProducto" th:value="${p.idProducto}">
                                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                                        onclick="return confirm('¿Eliminar este producto?')">
                                                    <i class="bi bi-trash"></i> Eliminar
                                                </button>
                                            </form>
                                            <a th:href="@{/productos/editar/{idProducto}(idProducto=${p.idProducto})}" class="btn btn-warning btn-sm">
                                                <i class="bi bi-pencil-square"></i> Editar
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
