<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" th:href="@{/images/icon.png}">
</head>
<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card border-dark shadow p-4" style="width: 25rem;">
        <div th:if="${success}"
             th:text="${success}"
             class="alert alert-success">
        </div>
        <div th:if="${error}"
             th:text="${error}"
             class="alert alert-info text-center py-2 mb-3">
        </div>
        <h2 class="text-center fw-bold mb-4">
            Recuperar Contraseña
        </h2>

        <p class="text-center text-muted small mb-4">
            Ingresá tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
        </p>



        <form action="/usuarios/enviar-recuperacion" method="post">

            <div class="mb-4">
                <label class="form-label">Correo electrónico</label>
                <input type="email"
                       name="correo"
                       class="form-control border-dark"
                       placeholder="ejemplo@correo.com"
                       required>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-dark">
                    Enviar enlace
                </button>
            </div>

        </form>

        <div class="text-center">
            <a href="/usuarios/login" class="text-dark text-decoration-none small">
                Volver a Iniciar Sesión
            </a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
