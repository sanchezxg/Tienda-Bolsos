<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Tienda de Bolsos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/images/icon.png}">
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-bag"></i> Bolsos&Co
        </a>
        <input type="checkbox" id="nav-toggle" class="nav-toggle-input">
        <label for="nav-toggle" class="navbar-toggler" aria-label="Abrir menú">
            <span class="navbar-toggler-icon"></span>
        </label>
        <div class="nav-collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/Tienda/home}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/Tienda/catalogo}">Catálogo</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/Tienda/contacto}">Contacto</a>
                </li>
            </ul>
            <ul class="navbar-nav">

                <li class="nav-item" th:if="${#authentication.name == 'anonymousUser'}">
                    <a class="nav-link" th:href="@{/usuarios/registro}">Registrarse</a>
                </li>

                <li class="nav-item" th:if="${#authentication.name == 'anonymousUser'}">
                    <a class="nav-link" th:href="@{/usuarios/login}">Iniciar sesión</a>
                </li>

                <!-- LOGUEADO -->
                <li class="nav-item" th:if="${#authentication.name != 'anonymousUser'}">
                    <a class="nav-link text-warning" href="#">
                        Hola, <span th:text="${#authentication.principal.nombre}"></span>
                    </a>
                </li>

                <li class="nav-item" th:if="${#authentication.name != 'anonymousUser'}">
                    <a class="nav-link" th:href="@{/compras}">
                        <i class="bi bi-receipt"></i> Compras realizadas
                    </a>
                </li>

                <li class="nav-item" th:if="${#authentication.name != 'anonymousUser'}">
                    <a class="nav-link" th:href="@{/productos}">
                        <i class="bi bi-box-seam"></i> Productos
                    </a>
                </li>

                <li class="nav-item" th:if="${#authentication.name != 'anonymousUser'}">
                    <a class="nav-link" th:href="@{/logout}">Cerrar sesión</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link position-relative" th:href="@{/Tienda/carrito}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark" id="cart-badge" style="font-size:0.6rem;">0</span>
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>
